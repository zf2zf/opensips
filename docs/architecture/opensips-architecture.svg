  <text x="400" y="837" text-anchor="middle" font-size="11" fill="#374151">Multi-Process Threading</text>
  <rect x="525" y="810" width="150" height="40" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
