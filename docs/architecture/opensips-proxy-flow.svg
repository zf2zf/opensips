<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 850">
  <style>
    text { font-family: "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Microsoft YaHei", "SimHei", sans-serif; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/>
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>
  <rect width="1000" height="850" fill="#ffffff"/>
  <text x="500" y="35" text-anchor="middle" font-size="22" font-weight="600" fill="#111827">OpenSIPS SIP 代理服务器流程图</text>
  <text x="500" y="58" text-anchor="middle" font-size="12" fill="#6b7280">SIP 代理请求处理流程</text>
  <rect x="60" y="110" width="120" height="60" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text x="120" y="135" text-anchor="middle" font-size="13" fill="#111827" font-weight="600">主叫用户</text>
  <text x="120" y="155" text-anchor="middle" font-size="11" fill="#6b7280">SIP Phone</text>
  <line x1="180" y1="140" x2="260" y2="140" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <rect x="270" y="110" width="200" height="60" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text x="370" y="135" text-anchor="middle" font-size="13" fill="#111827" font-weight="600">1. 接收 SIP 消息</text>
  <text x="370" y="155" text-anchor="middle" font-size="11" fill="#6b7280">UDP/TCP/TLS/WebSocket</text>
  <line x1="370" y1="170" x2="370" y2="185" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <rect x="270" y="200" width="200" height="60" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2" filter="url(#shadow)"/>
  <text x="370" y="225" text-anchor="middle" font-size="13" fill="#111827" font-weight="600">2. 解析 SIP 消息</text>
  <text x="370" y="245" text-anchor="middle" font-size="11" fill="#6b7280">Via, From, To, Call-ID, CSeq</text>
  <line x1="370" y1="260" x2="370" y2="275" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <rect x="270" y="290" width="200" height="60" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
  <text x="370" y="315" text-anchor="middle" font-size="13" fill="#111827" font-weight="600">3. 预处理</text>
  <text x="370" y="335" text-anchor="middle" font-size="11" fill="#6b7280">fix_nated_sdp, geoip</text>
  <line x1="370" y1="350" x2="370" y2="365" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <polygon points="370,345 470,380 370,415 270,380" fill="#fae8ff" stroke="#9333ea" stroke-width="2" filter="url(#shadow)"/>
  <text x="370" y="385" text-anchor="middle" font-size="12" fill="#111827" font-weight="600">需要认证?</text>
  <line x1="470" y1="380" x2="570" y2="380" stroke="#9333ea" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <text x="515" y="370" text-anchor="middle" font-size="10" fill="#9333ea">是</text>
  <rect x="580" y="350" width="160" height="60" rx="6" fill="#fae8ff" stroke="#9333ea" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="660" y="375" text-anchor="middle" font-size="12" fill="#111827" font-weight="600">认证检查</text>
  <text x="660" y="395" text-anchor="middle" font-size="10" fill="#6b7280">auth_db, auth_aaa</text>
  <line x1="660" y1="410" x2="660" y2="480" stroke="#9333ea" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <line x1="370" y1="415" x2="370" y2="475" stroke="#ea580c" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <text x="385" y="435" text-anchor="middle" font-size="10" fill="#ea580c">否</text>
  <rect x="270" y="495" width="200" height="60" rx="8" fill="#ecfeff" stroke="#0891b2" stroke-width="2" filter="url(#shadow)"/>
  <text x="370" y="520" text-anchor="middle" font-size="13" fill="#111827" font-weight="600">4. 位置服务查询</text>
  <text x="370" y="540" text-anchor="middle" font-size="11" fill="#6b7280">usrloc, 注册联系人</text>
  <path d="M 660 480 L 660 525 L 470 525 L 470 495" stroke="#9333ea" stroke-width="1.5" fill="none" marker-end="url(#arrow-purple)"/>
  <line x1="370" y1="555" x2="370" y2="570" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <rect x="270" y="585" width="200" height="60" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2" filter="url(#shadow)"/>
  <text x="370" y="610" text-anchor="middle" font-size="13" fill="#111827" font-weight="600">5. 路由决策</text>
  <text x="370" y="630" text-anchor="middle" font-size="11" fill="#6b7280">dialplan, dispatcher, rr</text>
  <line x1="370" y1="645" x2="370" y2="660" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <polygon points="370,640 500,675 370,710 240,675" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
  <text x="370" y="680" text-anchor="middle" font-size="11" fill="#111827" font-weight="600">本地处理 or 转发?</text>
  <line x1="240" y1="675" x2="140" y2="675" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="190" y="665" text-anchor="middle" font-size="10" fill="#16a34a">本地</text>
  <rect x="40" y="645" width="90" height="60" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="85" y="665" text-anchor="middle" font-size="11" fill="#111827" font-weight="600">本地</text>
  <text x="85" y="683" text-anchor="middle" font-size="10" fill="#6b7280">registrar</text>
  <text x="85" y="697" text-anchor="middle" font-size="10" fill="#6b7280">b2b_logic</text>
  <line x1="500" y1="675" x2="600" y2="675" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="550" y="665" text-anchor="middle" font-size="10" fill="#2563eb">转发</text>
  <rect x="610" y="645" width="90" height="60" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="655" y="665" text-anchor="middle" font-size="11" fill="#111827" font-weight="600">转发</text>
  <text x="655" y="683" text-anchor="middle" font-size="10" fill="#6b7280">tm模块</text>
  <text x="655" y="697" text-anchor="middle" font-size="10" fill="#6b7280">forward</text>
  <line x1="700" y1="675" x2="780" y2="675" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <rect x="790" y="110" width="150" height="60" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2" filter="url(#shadow)"/>
  <text x="865" y="135" text-anchor="middle" font-size="13" fill="#111827" font-weight="600">目标服务器</text>
  <text x="865" y="155" text-anchor="middle" font-size="11" fill="#6b7280">下一跳 SIP Server</text>
  <path d="M 85 705 L 85 790 L 370 790" stroke="#16a34a" stroke-width="1.5" fill="none"/>
  <path d="M 655 705 L 655 790 L 865 790 L 865 170" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#arrow-blue)"/>
  <line x1="370" y1="790" x2="370" y2="810" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow-gray)"/>
  <ellipse cx="370" cy="820" rx="70" ry="25" fill="#6b7280" filter="url(#shadow)"/>
  <text x="370" y="825" text-anchor="middle" font-size="13" fill="#ffffff" font-weight="600">结束</text>
  <rect x="50" y="15" width="250" height="75" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="60" y="30" font-size="10" fill="#6b7280" font-weight="600">图例:</text>
  <line x1="60" y1="47" x2="90" y2="47" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="100" y="51" font-size="10" fill="#6b7280">SIP 请求流程</text>
  <line x1="60" y1="67" x2="90" y2="67" stroke="#9333ea" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <text x="100" y="71" font-size="10" fill="#6b7280">认证检查</text>
  <line x1="170" y1="47" x2="200" y2="47" stroke="#ea580c" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <text x="210" y="51" font-size="10" fill="#6b7280">决策否</text>
  <rect x="720" y="15" width="230" height="75" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="730" y="30" font-size="10" fill="#6b7280" font-weight="600">核心模块:</text>
  <text x="730" y="45" font-size="9" fill="#6b7280">tm - 事务管理模块</text>
  <text x="730" y="58" font-size="9" fill="#6b7280">usrloc - 用户位置模块</text>
  <text x="730" y="71" font-size="9" fill="#6b7280">auth_db - 认证模块</text>
  <text x="730" y="84" font-size="9" fill="#6b7280">registrar - 注册模块</text>
</svg>