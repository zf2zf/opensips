########### 全局参数设置 ##########

/* 取消下面的注释以启用调试模式（会输出大量日志）*/
debug_mode=yes

# 日志级别：0-9，数字越大记录越详细
# 3 = LOG_INFO 级别，记录一般信息
log_level=9

# 模块级日志级别，与 log_level 类似，但用于 xlog 函数输出的日志
xlog_level=9

# 是否将错误日志输出到标准错误（stderr）
# no = 通过 syslog 输出，yes = 输出到控制台
stderror_enabled=yes

# 是否启用系统日志（syslog）记录
syslog_enabled=yes

# syslog 设施等级，用于日志分类
# LOG_LOCAL0 通常用于用户自定义应用日志
syslog_facility=LOG_LOCAL0

# UDP 工作进程数量，决定并发处理 SIP 消息的能力
# 根据服务器配置和预期负载调整
udp_workers=4

/* 取消下面注释以启用自动临时黑名单功能（默认禁用）
   当目标不可达时，自动将其加入黑名单，防止向已知不可用地址发送请求 */
#disable_dns_blacklist=no

/* 取消下面注释以启用 IPv6 DNS 查询失败后回退到 IPv4（默认禁用）
   适用于双栈网络环境 */
#dns_try_ipv6=yes


# SIP 监听套接字配置
# 格式：socket=协议:地址:端口
# 此处配置为在本机 UDP 端口 5060 监听
# 注意：生产环境通常需要修改为实际网卡 IP 地址
socket=udp:20.20.136.66:5060   # 请根据实际环境修改



########### 模块加载部分 ##########

# 设置模块搜索路径（module path）
# OpenSIPS 会从此路径加载 .so 模块文件
mpath="/usr/local/lib64/opensips/modules/"

#### 信令模块 (signaling)
# 功能：SIP 消息的信令平面管理
# 用途：提供信令传输的抽象，是大多数模块的依赖
loadmodule "signaling.so"

#### 无状态响应模块 (stateless)
# 功能：处理无状态的 SIP 响应（不创建事务）
# 用途：直接回复 SIP 响应，如 200 OK、404 等
loadmodule "sl.so"

#### 事务模块 (transaction)
# 功能：SIP 事务层管理（有状态处理）
# 用途：管理 INVITE 事务的创建、计时器、重试等
# 这是核心模块，支撑呼叫控制等高级功能
loadmodule "tm.so"

# tm 模块参数配置：
# fr_timeout: 非 INVITE 请求的最终响应超时时间（秒）
modparam("tm", "fr_timeout", 5)
# fr_inv_timeout: INVITE 请求的最终响应超时时间（秒）
modparam("tm", "fr_inv_timeout", 30)
# restart_fr_on_each_reply: 每次收到回复时是否重启计时器
modparam("tm", "restart_fr_on_each_reply", 0)
# onreply_avp_mode: 回复处理模式
modparam("tm", "onreply_avp_mode", 1)

#### 记录路由模块 (record route)
# 功能：在 SIP 消息中添加 Record-Route 头域
# 用途：确保后续请求（如 BYE、ACK）通过相同路径代理
loadmodule "rr.so"

# 不需要向 Record-Route 添加 From tag（此脚本不需要此功能）
modparam("rr", "append_fromtag", 0)

#### 最大转发次数模块 (max forward)
# 功能：处理 SIP 头中的 Max-Forwards 字段
# 用途：防止 SIP 消息在网络中无限循环
loadmodule "maxfwd.so"

#### SIP 消息操作模块
# 功能：提供对 SIP 消息头和正文的操作函数
# 用途：如添加/删除头部、修改 URI 等
loadmodule "sipmsgops.so"

#### FIFO 管理接口模块
# 功能：提供 FIFO 文件接口用于 OpenSIPS 管理
# 用途：允许外部程序通过文件系统与 OpenSIPS 通信
# 常用于命令行工具如 opensipsctl
#loadmodule "mi_fifo.so"

# FIFO 文件路径
#modparam("mi_fifo", "fifo_name", "/run/opensips/opensips_fifo")
# FIFO 文件权限（八进制）
#modparam("mi_fifo", "fifo_mode", 0666)

#### 用户位置模块 (user location)
# 功能：维护 SIP 用户的位置注册信息（URL 绑定）
# 用途：实现 SIP 呼叫的当前位置查询（类似 DNS）
# 数据存储在内存中，适合单实例部署
loadmodule "usrloc.so"

# NAT 标志名称，用于标识经过了 NAT 的用户
modparam("usrloc", "nat_bflag", "NAT")
# 工作模式预设：单实例无数据库（内存存储）
modparam("usrloc", "working_mode_preset", "single-instance-no-db")

#### 注册服务器模块 (registrar)
# 功能：处理 SIP REGISTER 请求，管理用户注册
# 用途：存储用户当前位置到 usrloc 模块
loadmodule "registrar.so"

# TCP 持久化标志，控制是否保持 TCP 连接
modparam("registrar", "tcp_persistent_flag", "TCP_PERSISTENT")
/* 取消下面注释以限制每个 AOR（地址-of-record）最多 10 个联系地址
   这是一种安全措施，防止注册洪水攻击 */
#modparam("registrar", "max_contacts", 10)

#### 计费/通话记录模块 (accounting)
# 功能：记录通话事件（启动、通话结束、丢弃等）
# 用途：生成 CDR（通话详单）用于计费或分析
loadmodule "acc.so"

# 是否记录早期媒体（early media）事件
modparam("acc", "early_media", 0)
# 是否报告被取消的呼叫
modparam("acc", "report_cancels", 0)
# 是否检测请求方向（用于正确处理计费）
# 启用此参数时，需要确保 rr 模块的 append_fromtag 也已启用
modparam("acc", "detect_direction", 0)

# 加载 UDP 协议处理模块
loadmodule "proto_udp.so"

#### 数据库文本驱动模块 (db_text)
# 功能：基于文本文件的数据库引擎，用文本文件模拟数据库
# 用途：用于不需要 MySQL 等数据库的场景，用文本文件存储数据
loadmodule "db_text.so"

#### 调度器模块 (dispatcher)
# 功能：SIP 目标地址的负载均衡和故障转移
# 用途：通过 ds_select_dst() 选择目标并转发请求
loadmodule "dispatcher.so"

########### 模块参数配置 ##########

# dispatcher 模块参数：使用 db_text 驱动
# db_url: 数据库连接URL，text:// 开头表示使用 db_text 驱动
modparam("dispatcher", "db_url", "text:///etc/opensips/dbtext/dispatcher")
# table_name: 调度器表名
modparam("dispatcher", "table_name", "dispatcher")

# db_text 模块参数：非缓存模式，检测文件变化自动重载
modparam("db_text", "db_mode", 1)

########### 路由逻辑部分 ##########

# ========== GB28181 MESSAGE handling ==========
route[gb28181_device_query] {
	xlog("L_INFO", "GB28181: Processing MESSAGE for device query\n");

	# Extract DeviceID from XML body: <DeviceID>xxxxx</DeviceID>
	$var(pos) = $(rb{s.index,<DeviceID>});
	if ($var(pos) > 0) {
		$var(tmp) = $(rb{s.substr,$var(pos),100});
		$var(pos_end) = $(var(tmp){s.index,</DeviceID>});
		if ($var(pos_end) > 0) {
			$var(device_id) = $(var(tmp){s.substr,11,$var(pos_end)});
			xlog("L_INFO", "GB28181: Extracted DeviceID=[$var(device_id)] from body\n");

			# Lookup device in usrloc using extracted DeviceID
			if (lookup("location")) {
				xlog("L_INFO", "GB28181: Found device in usrloc, forwarding\n");
				if (ds_select_dst(1, 0, "f")) {
					t_relay();
				} else {
					t_reply(404, "Device not reachable");
				}
				exit;
			}

			xlog("L_WARN", "GB28181: DeviceID=[$var(device_id)] not found in usrloc\n");
		}
	}

	t_reply(404, "Device Not Found");
	exit;
}

# 主请求路由逻辑
# 这是 OpenSIPS 处理每个 SIP 请求的入口点

route{

	# ========== 步骤1：最大转发次数检查 ==========
	# 检查 Max-Forwards 头字段，防止消息在网络中循环
	# 参数 10 表示最大跳数限制，如果达到 0 则拒绝请求
	if (!mf_process_maxfwd_header(10)) {
		send_reply(483,"Too Many Hops");  # 483 = 跳数过多
		exit;
	}

	# ========== 步骤2：检测是否为对话中的请求 ==========
	# To 字头（totag）用于标识对话中的请求（ACK、BYE、UPDATE 等）
	if (has_totag()) {

		# 处理 hop-by-hop 的 ACK（端到端确认）
		# 用于确认 200 OK 响应
		if ( is_method("ACK") && t_check_trans() ) {
			t_relay();
			exit;
		}

		# 对于对话中的顺序请求（如 BYE、UPDATE、REFER）
		# 需要按照 Record-Route 确定的路径发送
		if ( !loose_route() ) {
			# 如果收到没有 Route 头的顺序请求，说明配置有误
			# 我们为所有流量都做记录路由，所以不应该收到这种请求
			send_reply(404,"Not here");
			exit;
		}

		# 对于 BYE 请求，进行计费记录
		if (is_method("BYE")) {
			# 即使事务失败也要记录（用于统计被叫挂断等情况）
			do_accounting("log","failed");
		}

		# 将请求路由到 loose_route() 设置的目标 URI
		# 目标 URI 存储在 $du 变量中
		route(relay);
		exit;
	}

	# ========== 步骤3：处理 CANCEL 请求 ==========
	# CANCEL 用于取消正在进行的 INVITE 事务
	# 纯代理模式下直接转发 CANCEL
	if (is_method("CANCEL")) {
		forward();
		exit;
	}

	# ========== 步骤4：吸收重复请求 ==========
	# t_check_trans() 会检测重复请求并将其丢弃
	# 不会创建新事务，适用于无法创建事务的请求
	t_check_trans();

	# ========== 步骤5：检查请求的来源和目标 ==========
	# 判断是否为本地用户发出的请求
	if ( !(is_method("REGISTER")  ) ) {
		# 检查 From 头中的域名是否为本地域名
		if (is_myself("$fd")) {
			# 本地用户，可以继续处理
		} else {
			# 非本地用户呼叫，检查被叫是否在本地
			# 如果被叫也不是本地用户，则拒绝转发（防止成为开放中继）
			if (!is_myself("$rd")) {
				send_reply(403,"Relay Forbidden");  # 403 = 禁止中继
				exit;
			}
		}
	}

	# ========== 步骤6：预加载路由检查 ==========
	# 检查请求是否包含预加载的 Route 头（可能存在安全风险）
	if (loose_route()) {
		xlog("L_ERR",
			"Attempt to route with preloaded Route's [$fu/$tu/$ru/$ci]");
		if (!is_method("ACK"))
			send_reply(403,"Preload Route denied");
		exit;
	}

	# ========== 步骤7：记录路由 ==========
	# 为非 REGISTER 和非 MESSAGE 的请求添加 Record-Route 头
	# 确保后续请求通过相同代理路径
	if (!is_method("REGISTER|MESSAGE"))
		record_route();

	# ========== 步骤8：INVITE 计费 ==========
	# 对 INVITE 呼叫进行计费记录（开始计时）
	if (is_method("INVITE")) {
		do_accounting("log");
	}

	# ========== 步骤9：非本地请求路由 ==========
	# 如果被叫不在本地，添加到调度器并转发到外部
	if (!is_myself("$rd")) {
		append_hf("P-hint: outbound\r\n");  # 添加标记头域

		# 使用 dispatcher 选择目标并通过 tm 中继转发
		if (!ds_select_dst(1, 0, "f")) {
			sl_send_reply(503, "Service Unavailable");
			exit;
		}
		t_relay();
		exit;
	}

	# ========== 步骤10：处理本地请求 ==========

	# PUBLISH 和 SUBSCRIBE 暂不支持，返回服务不可用
	if (is_method("PUBLISH|SUBSCRIBE")) {
		send_reply(503, "Service Unavailable");
		exit;
	}

	# ========== 步骤11：处理 REGISTER 注册 ==========
	# 保存注册信息到本地 usrloc（用于路由来自上游的消息）
	# 使用 "no-reply" 标志不发送本地回复，让上游响应透传
	if (is_method("REGISTER")) {
		if (!save("location", "no-reply"))
			xlog("failed to register AoR $tu\n");

		# 使用 dispatcher 选择目标并通过 tm 中继转发到上游
		if (ds_select_dst(1, 0, "f")) {
			t_relay();
		} else {
			sl_send_reply(503, "Service Unavailable");
		}
		exit;
	}

	# ========== 步骤12：检查请求中的用户名 ==========
	# $rU 是请求 URI 中的用户名部分
	if ($rU==NULL) {
		# 请求中没有用户名，如 sip:@domain.com
		send_reply(484,"Address Incomplete");  # 484 = 地址不完整
		exit;
	}

	# ========== 步骤12b：GB28181 设备查询处理 ==========
	# 对于来自上游平台的 MESSAGE 查询
	# 检测条件：To 头是本机地址（平台查询本代理下的设备）
	# 而不是设备直接发来的 MESSAGE
	if (is_method("MESSAGE") && is_myself("$rd")) {
		# 使用 GB28181 特殊处理，从 XML body 提取 DeviceID 进行路由
		route(gb28181_device_query);
		exit;
	}

	# ========== 步骤13：位置查询 ==========
	# 在 usrloc 中查找被叫用户的位置
	# method-filtering 允许根据请求方法过滤联系人
	if (!lookup("location","method-filtering")) {
		# 未找到用户位置
		t_reply(404, "Not Found");
		exit;
	}

	# ========== 步骤14：记录丢失的呼叫 ==========
	# 如果呼叫未能成功连接（如被叫无响应），记录为"丢失"
	do_accounting("log","missed");

	# ========== 步骤15：使用 dispatcher 转发到被叫位置 ==========
	# 通过 ds_select_dst 使用 dispatcher 选择目标并通过 tm 中继转发
	if (!ds_select_dst(1, 0, "f")) {
		t_reply(404, "Not Found");
		exit;
	}
	t_relay();
}


# ========== 中继路由块（relay route） ==========
# 负责将 SIP 请求转发到目标地址（纯代理模式）
route[relay] {
	# 纯代理模式：直接转发请求，不创建事务
	forward();
	exit;
}



# ========== 分支路由块 ==========
# 当 INVITE 呼叫创建多个分支时（如呼叫同时振铃多个设备）触发
branch_route[per_branch_ops] {
	xlog("new branch at $ru\n");  # 记录新分支的目标 URI
}


# ========== 回复处理路由块 ==========
# 处理从网络收到的 SIP 响应消息
onreply_route[handle_nat] {
	xlog("incoming reply\n");  # 记录收到的响应
}


# ========== 失败路由块 ==========
# 当事务失败时触发（如被叫无响应、超时等）
failure_route[missed_call] {
	# 检查呼叫是否被取消
	if (t_was_cancelled()) {
		exit;  # 被取消则不再处理
	}

	# 取消下面注释以拒绝基于 3xx 重定向的呼叫
	# 这可以防止呼叫被重定向到未知目的地
	##if (t_check_status("3[0-9][0-9]")) {
	##t_reply(404,"Not found");
	##	exit;
	##}


}
