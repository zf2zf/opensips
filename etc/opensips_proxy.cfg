########### 全局参数设置 ##########

/* 取消下面的注释以启用调试模式（会输出大量日志）*/
#debug_mode=yes

# 日志级别：0-9，数字越大记录越详细
# 3 = LOG_INFO 级别，记录一般信息
log_level=3

# 模块级日志级别，与 log_level 类似，但用于 xlog 函数输出的日志
xlog_level=3

# 是否将错误日志输出到标准错误（stderr）
# no = 通过 syslog 输出，yes = 输出到控制台
stderror_enabled=yes

# 是否启用系统日志（syslog）记录
syslog_enabled=yes

# syslog 设施等级，用于日志分类
# LOG_LOCAL0 通常用于用户自定义应用日志
syslog_facility=LOG_LOCAL0

# UDP 工作进程数量，决定并发处理 SIP 消息的能力
# 根据服务器配置和预期负载调整
udp_workers=4

/* 取消下面注释以启用自动临时黑名单功能（默认禁用）
   当目标不可达时，自动将其加入黑名单，防止向已知不可用地址发送请求 */
#disable_dns_blacklist=no

/* 取消下面注释以启用 IPv6 DNS 查询失败后回退到 IPv4（默认禁用）
   适用于双栈网络环境 */
#dns_try_ipv6=yes


# SIP 监听套接字配置
# 格式：socket=协议:地址:端口
# 此处配置为在本机 UDP 端口 5060 监听
# 注意：生产环境通常需要修改为实际网卡 IP 地址
socket=udp:20.20.136.66:5060   # 请根据实际环境修改



########### 模块加载部分 ##########

# 设置模块搜索路径（module path）
# OpenSIPS 会从此路径加载 .so 模块文件
mpath="/usr/local/lib64/opensips/modules/"

#### 信令模块 (signaling)
# 功能：SIP 消息的信令平面管理
# 用途：提供信令传输的抽象，是大多数模块的依赖
loadmodule "signaling.so"

#### 无状态响应模块 (stateless)
# 功能：处理无状态的 SIP 响应（不创建事务）
# 用途：直接回复 SIP 响应，如 200 OK、404 等
loadmodule "sl.so"

#### 事务模块 (transaction)
# 功能：SIP 事务层管理（有状态处理）
# 用途：管理 INVITE 事务的创建、计时器、重试等
# 这是核心模块，支撑呼叫控制等高级功能
loadmodule "tm.so"

# tm 模块参数配置：
# fr_timeout: 非 INVITE 请求的最终响应超时时间（秒）
modparam("tm", "fr_timeout", 5)
# fr_inv_timeout: INVITE 请求的最终响应超时时间（秒）
modparam("tm", "fr_inv_timeout", 30)
# restart_fr_on_each_reply: 每次收到回复时是否重启计时器
modparam("tm", "restart_fr_on_each_reply", 0)
# onreply_avp_mode: 回复处理模式
modparam("tm", "onreply_avp_mode", 1)

#### 记录路由模块 (record route)
# 功能：在 SIP 消息中添加 Record-Route 头域
# 用途：确保后续请求（如 BYE、ACK）通过相同路径代理
loadmodule "rr.so"

# 不需要向 Record-Route 添加 From tag（此脚本不需要此功能）
modparam("rr", "append_fromtag", 0)

#### 最大转发次数模块 (max forward)
# 功能：处理 SIP 头中的 Max-Forwards 字段
# 用途：防止 SIP 消息在网络中无限循环
loadmodule "maxfwd.so"

#### SIP 消息操作模块
# 功能：提供对 SIP 消息头和正文的操作函数
# 用途：如添加/删除头部、修改 URI 等
loadmodule "sipmsgops.so"

#### SQLite 数据库模块
# 功能：SQLite 数据库驱动
# 用途：usrloc 数据持久化存储
loadmodule "db_sqlite.so"

#### FIFO 管理接口模块
# 功能：提供 FIFO 文件接口用于 OpenSIPS 管理
# 用途：允许外部程序通过文件系统与 OpenSIPS 通信
# 常用于命令行工具如 opensipsctl
#loadmodule "mi_fifo.so"

# FIFO 文件路径
#modparam("mi_fifo", "fifo_name", "/run/opensips/opensips_fifo")
# FIFO 文件权限（八进制）
#modparam("mi_fifo", "fifo_mode", 0666)

#### 用户位置模块 (user location)
# 功能：维护 SIP 用户的位置注册信息（URL 绑定）
# 用途：实现 SIP 呼叫的当前位置查询（类似 DNS）
# 数据存储在内存中，适合单实例部署
loadmodule "usrloc.so"

# NAT 标志名称，用于标识经过了 NAT 的用户
modparam("usrloc", "nat_bflag", "NAT")

#### usrloc 数据库模式配置 ####
# 使用 db_text 数据库存储 usrloc 数据，支持重启持久化
# db_url: 指向 db_text 的 location 表
# working_mode_preset: sql-write-back 模式
#   - 内存操作快速响应
#   - 异步同步到数据库（定时器刷新）
#   - 平衡了性能和可靠性
modparam("usrloc", "db_url", "sqlite:///var/lib/opensips/opensips.db")
modparam("usrloc", "working_mode_preset", "single-instance-sql-write-through")
# 定时器间隔：数据库同步周期（秒），默认值 60

#### 注册服务器模块 (registrar)
# 功能：处理 SIP REGISTER 请求，管理用户注册
# 用途：存储用户当前位置到 usrloc 模块
loadmodule "registrar.so"

# TCP 持久化标志，控制是否保持 TCP 连接
modparam("registrar", "tcp_persistent_flag", "TCP_PERSISTENT")
/* 取消下面注释以限制每个 AOR（地址-of-record）最多 10 个联系地址
   这是一种安全措施，防止注册洪水攻击 */
#modparam("registrar", "max_contacts", 10)

#### 计费/通话记录模块 (accounting)
# 功能：记录通话事件（启动、通话结束、丢弃等）
# 用途：生成 CDR（通话详单）用于计费或分析
loadmodule "acc.so"

# 是否记录早期媒体（early media）事件
modparam("acc", "early_media", 0)
# 是否报告被取消的呼叫
modparam("acc", "report_cancels", 0)
# 是否检测请求方向（用于正确处理计费）
# 启用此参数时，需要确保 rr 模块的 append_fromtag 也已启用
modparam("acc", "detect_direction", 0)

# 加载 UDP 协议处理模块
loadmodule "proto_udp.so"

#### 数据库文本驱动模块 (db_text)
# 功能：基于文本文件的数据库引擎，用文本文件模拟数据库
# 用途：用于不需要 MySQL 等数据库的场景，用文本文件存储数据
loadmodule "db_text.so"

#### 调度器模块 (dispatcher)
# 功能：SIP 目标地址的负载均衡和故障转移
# 用途：通过 ds_select_dst() 选择目标并转发请求
loadmodule "dispatcher.so"

#### UAC 模块 (uac)
# 功能：修改 SIP 消息中的 From/To/Contact 头域
# 用途：代理转发 REGISTER 时替换 Contact，使平台后续消息先发到代理
loadmodule "uac.so"

#### NAT 检测与处理模块 (nathelper)
# 功能：检测和修复 NAT 穿透问题
# 用途：确保位于 NAT 后的客户端响应经过代理
loadmodule "nathelper.so"
# 清空默认的 a=nortpproxy:yes 行,只为能启用 fix_nated_sdp 第 3 参数的
# new_sdp_lines 注入路径(add-no-rtpproxy flag + new_sdp_lines 互不冲突)
modparam("nathelper", "nortpproxy_str", "")

#### XML 解析模块 (xml)
# 功能：基于 libxml2 解析 SIP 消息体中的 XML（GB28181 Catalog 等）
# 用途：自学习设备与通道关系时使用 $xml(path) 替代脆弱的 re.subst 字符串匹配
loadmodule "xml.so"

#### SQL 操作模块 (sqlops)
# 功能：在 SIP 信令处理过程中执行 SQL 查询并把结果写到 AVP
# 用途：直接 SQL 插入 location 表，为 GB28181 子通道创建 usrloc 记录
loadmodule "sqlops.so"
modparam("sqlops", "db_url", "sqlite:///var/lib/opensips/opensips.db")

########### 模块参数配置 ##########

# dispatcher 模块参数：使用 db_text 驱动
# db_url: 数据库连接URL，text:// 开头表示使用 db_text 驱动
modparam("dispatcher", "db_url", "text:///etc/opensips/dbtext/dispatcher")
# table_name: 调度器表名
modparam("dispatcher", "table_name", "dispatcher")

# db_text 模块参数：非缓存模式，检测文件变化自动重载
modparam("db_text", "db_mode", 1)

########### 工具子路由 ##########

# ========== 步骤1：Max-Forwards 检查 ==========
# 检查 Max-Forwards 头字段，防止消息在网络中循环
route[maxfwd_check] {
	if (!mf_process_maxfwd_header(10)) {
		send_reply(483, "Too Many Hops");
		return -1;
	}
	return 1;
}

# ========== 步骤5：重复请求检查 ==========
# t_check_trans() 会检测重复请求并将其丢弃
route[dedup_check] {
	t_check_trans();
	return 1;
}

# ========== 步骤6：来源/目标域检查 ==========
route[domain_check] {
	if (!(is_method("REGISTER"))) {
		if (is_myself("$fd")) {
			# 本地用户，可以继续处理
		} else {
			if (!is_myself("$rd")) {
				send_reply(403, "Relay Forbidden");
				return -1;
			}
		}
	}
	return 1;
}

# ========== 步骤7：预加载路由检查 ==========
route[preload_route_check] {
	if (loose_route()) {
		xlog("L_ERR", "Attempt to route with preloaded Route's [$fu/$tu/$ru/$ci]");
		if (!is_method("ACK"))
			send_reply(403, "Preload Route denied");
		return -1;
	}
	return 1;
}

# ========== 步骤8：记录路由 ==========
route[record_route_add] {
	if (!is_method("REGISTER|MESSAGE"))
		record_route();
	return 1;
}

# ========== 步骤9：INVITE 计费（启动） ==========
route[acc_start] {
	if (is_method("INVITE"))
		do_accounting("log");
	return 1;
}

# ========== 步骤13：用户名检查 ==========
route[user_check] {
	if ($rU == NULL) {
		send_reply(484, "Address Incomplete");
		return -1;
	}
	return 1;
}

# ========== 步骤14：呼叫丢失记录 ==========
route[acc_missed] {
	do_accounting("log", "missed");
	return 1;
}

# ========== 步骤16：转发到被叫位置 ==========
route[forward_to_callee] {
	xlog("L_INFO", "========== FORWARD START ==========\n");
	xlog("L_INFO", "FORWARD: $hdr(From)\n");
	xlog("L_INFO", "FORWARD: $hdr(To)\n");
	xlog("L_INFO", "FORWARD: $hdr(Via)\n");
	xlog("L_INFO", "FORWARD: $hdr(Call-ID)\n");
	xlog("L_INFO", "FORWARD: $hdr(Contact)\n");
	xlog("L_INFO", "FORWARD: before ds_select_dst ru=$ru du=$du\n");
	t_on_reply("handle_nat");
	if (!ds_select_dst(1, 0, "f")) {
		xlog("L_WARN", "FORWARD: ds_select_dst failed, no destination available\n");
		t_reply(404, "Not Found");
		return -1;
	}
	xlog("L_INFO", "FORWARD: after ds_select_dst ru=$ru du=$du\n");
	xlog("L_INFO", "FORWARD: sending to sock=$socket_in(ip):$socket_in(port)\n");
	xlog("L_INFO", "FORWARD: ==========\n");
	t_relay();
	return 1;
}

########### 方法处理子路由 ##########

# ========== 对话中请求处理（has_totag） ==========
route[in_dialog] {
	# 处理 hop-by-hop 的 ACK（端到端确认）
	if (is_method("ACK") && t_check_trans()) {
		t_relay();
		return 1;
	}

	# 对于对话中的顺序请求（如 BYE、UPDATE、REFER）
	if (!loose_route()) {
		send_reply(404, "Not here");
		return -1;
	}

	# 对于 BYE 请求，进行计费记录
	if (is_method("BYE"))
		do_accounting("log", "failed");

	route(relay);
	return 1;
}

# ========== CANCEL 处理 ==========
route[cancel_handler] {
	forward();
	return 1;
}

# ========== REGISTER 处理 ==========
route[register_handler] {
	# 保存源地址到 AVP (用于日志)
	$avp(src_ip) = $si;
	$avp(src_port) = $sp;
	xlog("L_INFO", "REGISTER: src_ip=$avp(src_ip) src_port=$avp(src_port)\n");

	# 检查是否是注销请求 (Expires: 0)
	$avp(expires_hdr) = $hdr(Expires);
	xlog("L_INFO", "REGISTER: Expires=$avp(expires_hdr)\n");

	# 使用 nathelper 的 fix_nated_contact 替换 Contact 头为设备实际地址
	fix_nated_contact();
	xlog("L_INFO", "REPLACED Contact with ip=$avp(src_ip) port=$avp(src_port)\n");

	# 验证
	xlog("L_INFO", "Contact after replace: $ct\n");

	# 保存到 usrloc
	if (!save("location", "no-reply"))
		xlog("failed to register AoR $tu\n");

	# 设备注销时：删除该设备注册的所有子通道
	# attr 字段存储了 parent=录像机AOR，用于关联删除
	if ($avp(expires_hdr) == "0") {
		xlog("L_INFO", "REGISTER: device unregistering, cleaning up child channels for $tu\n");
		# 删除 attr 字段包含当前设备 AOR 的所有记录
		sql_query("DELETE FROM location WHERE attr LIKE '%' || '$tu' || '%'");
		xlog("L_INFO", "REGISTER: child channels cleaned up\n");
	}

	# 设置 onreply 路由处理 NAT
	t_on_reply("handle_nat");

	# 使用 dispatcher 选择目标并通过 tm 中继转发到上游
	if (ds_select_dst(1, 0, "f")) {
		t_relay();
	} else {
		sl_send_reply(503, "Service Unavailable");
	}
	return 1;
}

# ========== MESSAGE 处理 ==========
# 按条件分支：
# - From 域名格式 + To 本机 → 设备响应平台
# - 否则 → GB28181 设备查询

route[message_handler] {
	xlog("L_INFO", "MESSAGE check: tu=[$tu] td=[$td]\n");

	# 设备响应平台的 MESSAGE（From 域名格式，To 本机）
	if (!($fu =~ "@[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+:[0-9]+") && is_myself("$rd")) {
		route(device_msg_response);
		return 1;
	}

	# GB28181 设备查询（平台→设备）
	route(gb28181_msg_query);
	return 1;
}

# ========== GB28181 MESSAGE 设备查询（平台→设备） ==========
route[gb28181_msg_query] {
	xlog("L_INFO", "GB28181: Platform MESSAGE detected, calling gb28181_device_query\n");
	# 使用 GB28181 特殊处理，从 XML body 提取 DeviceID 进行路由
	route(gb28181_device_query);
	return 1;
}

# ========== GB28181 MESSAGE 设备查询核心 ==========
route[gb28181_device_query] {
	xlog("L_INFO", "GB28181: Processing MESSAGE for device query\n");

	# 平台发送的MESSAGE，From头包含平台域名
	# To头是设备ID@平台域名
	# lookup 使用 To 头作为 AOR 查找设备实际地址
	# 查到的 Contact（设备实际IP）会替换 RURI

	xlog("L_INFO", "GB28181: Looking up location for tu=[$tu]\n");
	if (lookup("location")) {
		xlog("L_INFO", "GB28181: Found device in usrloc, forwarding to [$ru]\n");

		# 设置 onreply 路由处理 NAT
		t_on_reply("handle_nat");

		# lookup 已经把 R-URI 改成了设备的 Contact 地址
		# 直接 t_relay 即可，不需要再 ds_select_dst
		t_relay();
		exit;
	}

	xlog("L_WARN", "GB28181: Device not found in usrloc for tu=[$tu]\n");
	t_reply(404, "Device Not Found");
	return 1;
}

# ========== 设备响应 MESSAGE（设备→平台） ==========
route[device_msg_response] {
	# --- 打印当前 usrloc 状态（调试用）---
	xlog("L_INFO", "DEVICE_MSG: ================================================\n");
	xlog("L_INFO", "DEVICE_MSG: entering device_msg_response\n");
	xlog("L_INFO", "DEVICE_MSG: ruri=$ru from=$fu to=$tu src=$si:$sp\n");
	xlog("L_INFO", "DEVICE_MSG: ================================================\n");
	if (lookup("location")) {
		xlog("L_INFO", "DEVICE_MSG: usrloc lookup found ru=$ru du=$du\n");
	} else {
		xlog("L_INFO", "DEVICE_MSG: no usrloc match for current RURI\n");
	}

	# --- GB28181 自学习：解析 Catalog 响应，将通道→设备映射存入 usrloc ---
	# 录像机上报 Catalog，包含多个摄像头。
	# 每个通道的 AOR: sip:通道ID@本机域，Contact: 录像机地址

	if ($rb =~ "Catalog") {
		$xml(cat) = $rb;
		$var(i) = 0;
		$var(cnt) = 0;
		xlog("L_INFO", "DEVICE_MSG: ================================================\n");
		xlog("L_INFO", "DEVICE_MSG: ===== CATALOG PRE-INSERT: counting channels =====\n");

		# 先统计有多少个通道需要插入
		while ($var(i) < 256) {
			$avp(tmp_id) = $xml(cat/Response/DeviceList/Item[$var(i)]/DeviceID.val);
			if ($avp(tmp_id) == NULL || $(avp(tmp_id){s.len}) == 0) {
				break;
			}
			$avp(tmp_parent) = $xml(cat/Response/DeviceList/Item[$var(i)]/ParentID.val);
			if ($avp(tmp_id) != $avp(tmp_parent)) {
				$var(cnt) = $var(cnt) + 1;
				xlog("L_INFO", "DEVICE_MSG: PRE-INSERT channel[$var(cnt)]: $avp(tmp_id) parent=$avp(tmp_parent)\n");
			}
			$var(i) = $var(i) + 1;
		}
		xlog("L_INFO", "DEVICE_MSG: ===== CATALOG PRE-INSERT: will insert $var(cnt) channels =====\n");
		xlog("L_INFO", "DEVICE_MSG: ================================================\n");

		# 重新遍历，实际插入
		$var(i) = 0;
		$var(cnt) = 0;
		while ($var(i) < 256) {
			$avp(chan_id) = $xml(cat/Response/DeviceList/Item[$var(i)]/DeviceID.val);
			if ($avp(chan_id) == NULL || $(avp(chan_id){s.len}) == 0) {
				break;
			}
			$avp(parent_id) = $xml(cat/Response/DeviceList/Item[$var(i)]/ParentID.val);

			# 跳过录像机自身（ParentID == DeviceID）
			if ($avp(chan_id) != $avp(parent_id)) {
				$var(cnt) = $var(cnt) + 1;
				xlog("L_INFO", "DEVICE_MSG: ================================================\n");
				xlog("L_INFO", "DEVICE_MSG: ===== INSERTING channel[$var(cnt)]: $avp(chan_id) =====\n");

				# 从 XML 提取通道信息
				$avp(chan_name) = $xml(cat/Response/DeviceList/Item[$var(i)]/Name.val);
				$avp(chan_manufacturer) = $xml(cat/Response/DeviceList/Item[$var(i)]/Manufacturer.val);
				$avp(chan_model) = $xml(cat/Response/DeviceList/Item[$var(i)]/Model.val);
				xlog("L_INFO", "DEVICE_MSG: channel info - name=$avp(chan_name) manufacturer=$avp(chan_manufacturer) model=$avp(chan_model)\n");

				# 保存原始 RURI
				$avp(orig_ru) = $ru;
				xlog("L_INFO", "DEVICE_MSG: INSERT: orig_ru=$avp(orig_ru)\n");

				# 构造通道 AOR: sip:通道ID@录像机域名
				# 录像机域名来自 $fd (MESSAGE From 头域)
				$avp(channel_aor) = "sip:" + $avp(chan_id) + "@" + $fd;
				# 保存录像机域名，供 gb28181_invite_playback 中 lookup 使用
				$avp(recorder_domain) = $fd;
				xlog("L_INFO", "DEVICE_MSG: INSERT: aor=$avp(channel_aor) recorder_domain=$avp(recorder_domain)\n");

				# 直接 SQL 插入 location 表（绕过 save() 的限制）
				# 使用 sql_query 执行原始 INSERT，这样可以使用 SQL 函数
				$avp(recorder_contact) = "sip:" + $avp(chan_id) + "@" + $si + ":" + $sp;
				xlog("L_INFO", "DEVICE_MSG: INSERT: channel=$avp(chan_id) domain=$fd contact=$avp(recorder_contact)\n");

				# user_agent 组合：Name/Manufacturer/Model
				$avp(channel_ua) = $avp(chan_manufacturer) + " " + $avp(chan_model) + " (" + $avp(chan_name) + ")";
				# attr 字段存储父设备 AOR，用于设备注销时级联删除子通道
				$avp(channel_attr) = "parent=" + $fu;  # From 头就是录像机 AOR
				sql_query("INSERT INTO location (username, domain, contact, expires, q, callid, cseq, last_modified, flags, user_agent, socket, attr) VALUES ('$avp(chan_id)', '$fd', '$avp(recorder_contact)', 1790000000, -1.0, '$ci', 9999, datetime('now', 'localtime'), 0, '$avp(channel_ua)', 'udp:$socket_in(ip):$socket_in(port)', '$avp(channel_attr)')");
				xlog("L_INFO", "DEVICE_MSG: INSERT: sql_insert completed, user_agent=$avp(channel_ua) attr=$avp(channel_attr)\n");

				# 验证：使用 lookup 检查是否插入成功
				$ru = "sip:" + $avp(chan_id) + "@" + $fd;
				xlog("L_INFO", "DEVICE_MSG: INSERT: before-lookup ru=$ru\n");
				if (lookup("location")) {
					xlog("L_INFO", "DEVICE_MSG: INSERT: VERIFY OK - lookup found ru=$ru du=$du\n");
				} else {
					xlog("L_WARN", "DEVICE_MSG: INSERT: VERIFY FAILED - lookup not found for $ru\n");
				}
				xlog("L_INFO", "DEVICE_MSG: ================================================\n");
			}
			$var(i) = $var(i) + 1;
		}
		xlog("L_INFO", "DEVICE_MSG: ================================================\n");
		xlog("L_INFO", "DEVICE_MSG: ===== CATALOG POST-INSERT: inserted $var(cnt) channels =====\n");
		xlog("L_INFO", "DEVICE_MSG: ================================================\n");
		$xml(cat) = NULL;
	}

	# 转发设备响应到平台
	append_hf("P-hint: outbound\r\n");
	t_on_reply("handle_nat");
	if (ds_select_dst(1, 0, "f")) {
		t_relay();
	} else {
		sl_send_reply(503, "Service Unavailable");
	}
	return 1;
}


# ========== PUBLISH|SUBSCRIBE 处理 ==========
route[publish_subscribe] {
	send_reply(503, "Service Unavailable");
	return 1;
}

# ========== INVITE 处理 ==========
route[invite_handler] {
	xlog("L_INFO", "============================================================
");
	xlog("L_INFO", "INVITE-IN ENTRY: method=$rm callid=$ci
");
	xlog("L_INFO", "INVITE-IN: From=$fu
");
	xlog("L_INFO", "INVITE-IN: To=$tu
");
	xlog("L_INFO", "INVITE-IN: Via=$hdr(Via)
");
	xlog("L_INFO", "INVITE-IN: Call-ID=$ci
");
	xlog("L_INFO", "INVITE-IN: CSeq=$cs $rm
");
	xlog("L_INFO", "INVITE-IN: Contact=$hdr(Contact)
");
	xlog("L_INFO", "INVITE-IN: Record-Route=$hdr(Record-Route)
");
	xlog("L_INFO", "INVITE-IN: Route=$hdr(Route)
");
	xlog("L_INFO", "INVITE-IN: Content-Type=$hdr(Content-Type)
");
	xlog("L_INFO", "INVITE-IN: msg_len=$(mb{s.len})
");
	xlog("L_INFO", "INVITE-IN: ruri=$ru
");
	xlog("L_INFO", "INVITE-IN: ruri_user=$rU ruri_host=$rd
");
	xlog("L_INFO", "INVITE-IN: from_user=$fU from_host=$fd
");
	xlog("L_INFO", "INVITE-IN: to_user=$tU to_host=$td
");
	xlog("L_INFO", "INVITE-IN: src_ip=$si src_port=$sp
");
	xlog("L_INFO", "INVITE-IN: dst_ip=$di dst_port=$dp
");
	xlog("L_INFO", "INVITE-IN: is_myself_rd=$rd is_myself_fd=$fd
");
	xlog("L_INFO", "INVITE-IN SDP: body_len=$(rb{s.len})
");
	xlog("L_INFO", "INVITE-IN SDP:
$rb
");
	xlog("L_INFO", "============================================================
");

	route(acc_start);

	# 非本地请求（设备→平台，R-URI 目的地址不是本机）
	xlog("L_INFO", "INVITE-BRANCH: checking non_local_route condition
");
	xlog("L_INFO", "INVITE-BRANCH: is_myself(rd)=$rd rd=$rd
");
	# 非本机且不是纯数字用户名 → 设备主动 INVITE 到平台外的地址
	if (!is_myself("$rd") && !($rU =~ "^[0-9]+$")) {
		xlog("L_INFO", "INVITE-BRANCH: >>>>>>>> NON-LOCAL ROUTE (device->platform) >>>>>>>
");
		xlog("L_INFO", "INVITE-BRANCH: rd=$rd is NOT local, rU=$rU is not numeric
");
		route(non_local_route);
		return 1;
	}

	# GB28181 INVITE 回放（平台→子通道）
	xlog("L_INFO", "INVITE-BRANCH: checking GB28181 playback condition
");
	xlog("L_INFO", "INVITE-BRANCH: is_myself(fd)=$fd is_myself(rd)=$rd rU=$rU
");

	# 匹配条件：From 或 To 域名是本机；To 不是本机；用户名是纯数字
	# 设备 INVITE 的 From 可能是设备域，To 才是本机域
	if ( (is_myself("$fd") || is_myself("$td")) && !is_myself("$rd") && $rU =~ "^[0-9]+$") {
		xlog("L_INFO", "INVITE-BRANCH: >>>>>>>> GB28181 PLAYBACK PATH >>>>>>>
");
		xlog("L_INFO", "INVITE-BRANCH: condition met - fd=$fd td=$td is_local, rd=$rd NOT_local, rU=$rU is_numeric
");
		route(gb28181_invite_playback);
		if ($rc == 1) {
			xlog("L_INFO", "INVITE-BRANCH: gb28181_playback SUCCESS, request relayed
");
			exit;
		}
		xlog("L_WARN", "INVITE-BRANCH: gb28181_playback returned rc=$rc, falling through
");
	} else {
		xlog("L_INFO", "INVITE-BRANCH: not GB28181 playback path, is_myself(fd)=$fd is_myself(td)=$td
");
	}

	# 标准位置查询
	xlog("L_INFO", "INVITE-BRANCH: >>>>>>>> STANDARD LOOKUP PATH >>>>>>>
");
	xlog("L_INFO", "INVITE-BRANCH: before lookup ru=$ru
");
	# 设备 INVITE 的 R-URI 域名可能是 IP:PORT，与 usrloc AOR 域名格式不一致
	# 改用纯用户名匹配（不依赖域名），先用 $rU 查，再用 $tU 查
	if (!lookup("location")) {
		xlog("L_WARN", "INVITE-lookup: NOT FOUND for ru=$ru (rU=$rU), trying tU fallback
");
		# fallback：尝试用 To 用户名作为 R-URI 再 lookup
		$ru = "sip:" + $tU + "@" + $fd;
		if (lookup("location")) {
			xlog("L_INFO", "INVITE-lookup: FOUND by tU fallback, ru=$ru du=$du
");
			route(acc_missed);
			route(forward_to_callee);
			return 1;
		}
		xlog("L_WARN", "INVITE-lookup: tU fallback also FAILED
");
		t_reply(404, "Not Found");
		return -1;
	}
	xlog("L_INFO", "INVITE-lookup: FOUND, after lookup ru=$ru du=$du
");

	route(acc_missed);
	route(forward_to_callee);
	return 1;
}

# ========== 非本地请求路由（设备→平台） ==========
route[non_local_route] {
	xlog("L_INFO", "========== NON-LOCAL START ==========\n");
	xlog("L_INFO", "NON-LOCAL: $hdr(From)\n");
	xlog("L_INFO", "NON-LOCAL: $hdr(To)\n");
	xlog("L_INFO", "NON-LOCAL: $hdr(Via)\n");
	xlog("L_INFO", "NON-LOCAL: $hdr(Call-ID)\n");
	xlog("L_INFO", "NON-LOCAL: $hdr(Contact)\n");
	xlog("L_INFO", "NON-LOCAL: src=$si:$sp fd=$fd rd=$rd ru=$ru\n");
	xlog("L_INFO", "NON-LOCAL: ==========\n");

	append_hf("P-hint: outbound\r\n");
	t_on_reply("handle_nat");

	if (!ds_select_dst(1, 0, "f")) {
		xlog("L_WARN", "NON-LOCAL: ds_select_dst failed\n");
		sl_send_reply(503, "Service Unavailable");
		return -1;
	}
	xlog("L_INFO", "NON-LOCAL: forwarding to du=$du\n");
	t_relay();
	return 1;
}

# ========== GB28181 INVITE 回放（平台→子通道） ==========
# 返回：1 = 成功处理并响应，-1 = 未命中映射需走默认流程
route[gb28181_invite_playback] {
	xlog("L_INFO", "========== PB-INVITE START ==========\n");
	xlog("L_INFO", "PB-INVITE-IN: ruri=$ru from=$fu\n");

	# 保存原始 RURI（设备用它识别通道）
	$avp(orig_ruri) = $ru;

	# 关键：使用录像机域名（$avp(recorder_domain)）进行 lookup
	# 这是在 device_msg_response 中插入 channel 时保存的
	# 如果 AVP 丢失，使用本机域名作为 fallback
	if ($avp(recorder_domain) == NULL) {
		xlog("L_INFO", "PB-INVITE: recorder_domain AVP is NULL, using $fd as fallback\n");
		$avp(recorder_domain) = $fd;
	}

	$ru = "sip:" + $rU + "@" + $avp(recorder_domain);
	xlog("L_INFO", "PB-INVITE: lookup channel at $ru\n");

	# 立即查询验证是否在 usrloc 中
	xlog("L_INFO", "PB-INVITE: trying immediate lookup...\n");
	if (lookup("location")) {
		xlog("L_INFO", "PB-INVITE: immediate lookup SUCCESS, du=$du\n");
		$ru = $avp(orig_ruri);
		t_on_reply("handle_nat");
		t_relay();
		return 1;
	} else {
		xlog("L_WARN", "PB-INVITE: immediate lookup FAILED, trying standard...\n");
		$ru = $avp(orig_ruri);
		return -1;
	}
}

########### 主路由逻辑 ##########

route{
	# ========== 步骤1：Max-Forwards 检查 ==========
	route(maxfwd_check);
	if ($rc < 0)
		exit;

	# ========== 步骤2：对话中请求 ==========
	if (has_totag()) {
		route(in_dialog);
		exit;
	}

	# ========== 步骤5：重复请求检查 ==========
	route(dedup_check);

	# ========== 步骤6：来源/目标域检查 ==========
	route(domain_check);
	if ($rc < 0)
		exit;

	# ========== 步骤7：预加载路由检查 ==========
	route(preload_route_check);
	if ($rc < 0)
		exit;

	# ========== 步骤8：记录路由 ==========
	route(record_route_add);

	# ========== 按方法分类处理 ==========

	if (is_method("CANCEL")) {
		route(cancel_handler);
		exit;
	}

	if (is_method("REGISTER")) {
		route(register_handler);
		exit;
	}

	if (is_method("MESSAGE")) {
		route(message_handler);
		exit;
	}

	if (is_method("PUBLISH|SUBSCRIBE")) {
		route(publish_subscribe);
		exit;
	}

	if (is_method("INVITE")) {
		route(invite_handler);
		exit;
	}

	# ========== 其他方法：位置查询 + 转发 ==========
	route(user_check);
	if (!lookup("location", "method-filtering")) {
		t_reply(404, "Not Found");
		exit;
	}
	route(acc_missed);
	route(forward_to_callee);
}


# ========== 中继路由块（relay route） ==========
# 负责将 SIP 请求转发到目标地址（纯代理模式）
route[relay] {
	# 纯代理模式：直接转发请求，不创建事务
	forward();
	exit;
}



# ========== 分支路由块 ==========
# 当 INVITE 呼叫创建多个分支时（如呼叫同时振铃多个设备）触发
branch_route[per_branch_ops] {
	xlog("new branch at $ru\n");  # 记录新分支的目标 URI
}


# ========== 回复处理路由块 ==========
# 处理从网络收到的 SIP 响应消息
onreply_route[handle_nat] {
	xlog("incoming reply\n");  # 记录收到的响应

	# --- 自学习:在 200 OK 响应里识别 Catalog 响应 XML ---
	# 平台→设备方向(t_relay 后的响应)有 200 OK 携带 Catalog 响应体,
	# 这里把 body 抽出来用 xml 模块解析 Item/ParentID 写回 dbtext。
	# onreply_route 里优先使用 $rb(body);若 rb 为空再从 $mb 切到首个 \r\n\r\n
	# 之后的内容作为 body。
	xlog("L_INFO", "GB28181 reply-hit: status=$rs mb_len=$(mb{s.len}) mb_head=[$(mb{s.select,0,60})]\n");
	# === GB28181 设备 bug 兼容 + 规范补充:EasyGBD 的 200 OK SDP 漏写
	# a=setup:active 和 a=connection:new(GB28181-2016 强制要求)。
	# 同时设备 200 OK 自带 c=20.20.83.203, m=3288 是设备侧真实媒体端点;
	# 之前把 c= 改写为平台 IP 后,c=:m= 自相矛盾(目标平台,端口设备),反而
	# 让 EasyGBS 失去设备媒体端点的线索。改为:不重写 c=,只补 a=setup:active
	# / a=connection:new(告知 EasyGBS 设备是 active 端,应主动发起 TCP)。
	# new_sdp_lines 末尾不带 \r\n,避免和 nathelper 的 a=oldcip 之间多出空行。
	if (t_check_status("200") && $mb =~ "application/sdp") {
		# === DEBUG: 抓取设备 200 OK 的关键 SDP 字段(我们改写前),辅助排查 ===
		# POSIX 兼容正则(避开 \s/\S/lazy)
		$avp(d_c)   = $(rb{re.subst, /c=IN IP4 ([0-9.]+)/\1/});
		$avp(d_m)   = $(rb{re.subst, /m=video ([0-9]+)/\1/});
		$avp(d_set) = $(rb{re.subst, /a=setup:([a-z]+)/\1/});
		$avp(d_con) = $(rb{re.subst, /a=connection:([a-z]+)/\1/});
		$avp(d_dir) = $(rb{re.subst, /a=(sendonly|recvonly|sendrecv)/\1/});
		xlog("L_INFO", "PB-200OK-DEV: c=$avp(d_c) m=$avp(d_m) setup=[$avp(d_set)] conn=[$avp(d_con)] dir=$avp(d_dir) mb_len=$(mb{s.len})\n");
		fix_nated_sdp("add-no-rtpproxy", "$socket_in(ip)", "\r\na=setup:active\r\na=connection:new");
		xlog("L_INFO", "PB-200OK-FIX: applied (inject setup:active/connection:new)\n");
	}
	if (t_check_status("2[0-9][0-9]") && $mb =~ "Catalog") {
		$avp(cat_body) = $rb;
		if ($avp(cat_body) == NULL || $(avp(cat_body){s.len}) == 0) {
			$avp(cat_body) = $(mb{re.subst, /^[\s\S]*?\r\n\r\n([\s\S]*)$/\1/s});
		}
		if ($avp(cat_body) != NULL && $(avp(cat_body){s.len}) > 0) {
			# 用 libxml2 解析 Catalog 响应,遍历 Item 写入 location 表
			$xml(cat) = $avp(cat_body);
			$var(i) = 0;
			while ($var(i) < 256) {
				$avp(chan_id) = $xml(cat/Response/DeviceList/Item[$var(i)]/DeviceID.val);
				if ($avp(chan_id) == NULL || $(avp(chan_id){s.len}) == 0) {
					break;
				}
				$avp(parent_id) = $xml(cat/Response/DeviceList/Item[$var(i)]/ParentID.val);
				if ($avp(chan_id) != $avp(parent_id)) {
					# 直接 SQL 插入 location 表
					# onreply_route 中报文字段可能不可用，使用固定值
					$avp(recorder_contact) = "sip:" + $avp(chan_id) + "@" + $si + ":" + $sp;
					sql_query("INSERT INTO location (username, domain, contact, expires, q, callid, cseq, last_modified, flags, user_agent, socket) VALUES ('$avp(chan_id)', '$fd', '$avp(recorder_contact)', 1790000000, -1.0, 'reply', 9999, datetime('now', 'localtime'), 0, 'GB28181Channel', 'udp:$socket_in(ip):$socket_in(port)')");
					xlog("L_INFO", "GB28181 self-learn: $avp(chan_id)@$fd -> $avp(recorder_contact)\n");
				} else {
					xlog("L_WARN", "GB28181 self-learn: Item[$var(i)] chan=[$avp(chan_id)] parent=[$avp(chan_id)] is recorder, skipped\n");
				}
				$var(i) = $var(i) + 1;
			}
			# 释放 xml 对象,避免遗留到下一次回复
			$xml(cat) = NULL;
		} else {
			xlog("L_WARN", "GB28181 self-learn: empty body in 200 reply\n");
		}
	}

	# 修复 Contact，确保后续请求/响应经过代理
	fix_nated_contact();
}


# ========== 失败路由块 ==========
# 当事务失败时触发（如被叫无响应、超时等）
failure_route[missed_call] {
	# 检查呼叫是否被取消
	if (t_was_cancelled()) {
		exit;  # 被取消则不再处理
	}

	# 取消下面注释以拒绝基于 3xx 重定向的呼叫
	# 这可以防止呼叫被重定向到未知目的地
