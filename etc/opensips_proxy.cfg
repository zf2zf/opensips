#
# 这是一个基础的住宅（residential）配置文件。即可使用的 M4 模板位于
# examples/templates/ 目录下，可供快速部署参考。
#
# 有关可用语句、函数和参数的详细说明，请参阅 OpenSIPS 手册：
#      https://opensips.org/Documentation/Manuals
