#
# OpenSIPS GB28181 代理配置
# 用于 GB28181 视频平台，代理设备与平台之间的 SIP 信令
#

########### 全局参数 ##########

log_level=3
xlog_level=3
stderror_enabled=yes
syslog_enabled=yes
syslog_facility=LOG_LOCAL0
udp_workers=4

# SIP 监听地址（从 local.cfg 加载）
include_file "/etc/opensips/local.cfg"

########### 模块加载 ##########

mpath="/usr/local/lib64/opensips/modules/"

loadmodule "signaling.so"
loadmodule "sl.so"
loadmodule "tm.so"
modparam("tm", "fr_timeout", 5)
modparam("tm", "fr_inv_timeout", 30)
modparam("tm", "restart_fr_on_each_reply", 0)
modparam("tm", "onreply_avp_mode", 1)

loadmodule "rr.so"
modparam("rr", "append_fromtag", 0)

loadmodule "maxfwd.so"
loadmodule "sipmsgops.so"
loadmodule "db_sqlite.so"
loadmodule "usrloc.so"
loadmodule "registrar.so"
loadmodule "acc.so"
loadmodule "proto_udp.so"
loadmodule "db_text.so"
loadmodule "dispatcher.so"
loadmodule "uac.so"
loadmodule "nathelper.so"
loadmodule "xml.so"
loadmodule "sqlops.so"

# usrloc 配置：sql-only 模式，直接操作 SQLite
# use_domain=false 让 lookup/save 基于 username 匹配，支持跨域查询
modparam("usrloc", "db_url", "sqlite:///var/lib/opensips/opensips.db")
modparam("usrloc", "working_mode_preset", "sql-only")
modparam("usrloc", "use_domain", false)
modparam("usrloc", "nat_bflag", "NAT")

# sqlops 配置：与 usrloc 共用同一个 SQLite 数据库
modparam("sqlops", "db_url", "sqlite:///var/lib/opensips/opensips.db")

# dispatcher 配置
modparam("dispatcher", "db_url", "text:///etc/opensips/dbtext/dispatcher")
modparam("dispatcher", "table_name", "dispatcher")

# nathelper 配置
modparam("nathelper", "nortpproxy_str", "")

# db_text 配置
modparam("db_text", "db_mode", 1)

########### 工具路由 ##########

route[maxfwd] {
    if (!mf_process_maxfwd_header(10)) {
        sl_send_reply(483, "Too Many Hops");
        return -1;
    }
    return 1;
}

route[dedup] {
    t_check_trans();
    return 1;
}

route[relay] {
    forward();
    exit;
}

########### 注册处理 ##########

route[register] {
    $avp(expires_hdr) = $hdr(Expires);
    fix_nated_contact();

    if (!save("location", "no-reply"))
        xlog("L_ERR", "REGISTER: failed for $tu\n");

    # 设备注销时：级联删除该设备的所有子通道
    if ($avp(expires_hdr) == "0") {
        sql_query("DELETE FROM location WHERE attr LIKE '%' || '$tu' || '%'");
        xlog("L_INFO", "REGISTER: child channels cleaned for $tu\n");
    }

    t_on_reply("handle_nat");
    if (ds_select_dst(1, 0, "f"))
        t_relay();
    else
        sl_send_reply(503, "Service Unavailable");
    return 1;
}

########### MESSAGE 处理 ##########

route[message] {
    # 设备响应：To 本机 + From 非本机
    # 设备查询：To 外部地址
    if (is_myself("$td") && !is_myself("$fd")) {
        route(device_response);
    } else {
        route(platform_query);
    }
    return 1;
}

route[platform_query] {
    # 平台查询设备：lookup 查设备注册地址
    if (lookup("location")) {
        t_on_reply("handle_nat");
        t_relay();
        return 1;
    }
    sl_send_reply(404, "Device Not Found");
    return 1;
}

route[device_response] {
    # 按命令类型分发
    if ($rb =~ "Catalog") {
        route(process_catalog);
    } else if ($rb =~ "DeviceInfo") {
        route(process_device_info);
    }
    # 转发设备响应到平台
    append_hf("P-hint: outbound\r\n");
    t_on_reply("handle_nat");
    if (ds_select_dst(1, 0, "f"))
        t_relay();
    else
        sl_send_reply(503, "Service Unavailable");
    return 1;
}

route[process_catalog] {
    # 解析 Catalog XML，INSERT 子通道到 location 表
    $xml(cat) = $rb;
    $var(cnt) = 0;
    $var(i) = 0;

    while ($var(i) < 256) {
        $avp(chan_id) = $xml(cat/Response/DeviceList/Item[$var(i)]/DeviceID.val);
        if ($avp(chan_id) == NULL || $(avp(chan_id){s.len}) == 0)
            break;

        $avp(parent_id) = $xml(cat/Response/DeviceList/Item[$var(i)]/ParentID.val);

        # 跳过录像机自身（通道ID == 父ID）
        if ($avp(chan_id) != $avp(parent_id)) {
            $avp(chan_name) = $xml(cat/Response/DeviceList/Item[$var(i)]/Name.val);
            $avp(chan_manufacturer) = $xml(cat/Response/DeviceList/Item[$var(i)]/Manufacturer.val);
            $avp(chan_model) = $xml(cat/Response/DeviceList/Item[$var(i)]/Model.val);
            $avp(recorder_contact) = "sip:" + $avp(chan_id) + "@" + $si + ":" + $sp;
            $avp(channel_ua) = $avp(chan_manufacturer) + " " + $avp(chan_model) + " (" + $avp(chan_name) + ")";
            $avp(channel_attr) = "parent=" + $fu;
            sql_query("INSERT INTO location (username, domain, contact, expires, q, callid, cseq, last_modified, flags, user_agent, socket, attr)
                VALUES ('$avp(chan_id)', '$fd', '$avp(recorder_contact)', 1790000000, -1.0, '$ci', 9999, datetime('now', 'localtime'), 0, '$avp(channel_ua)', 'udp:$socket_in(ip):$socket_in(port)', '$avp(channel_attr)')");
            $var(cnt) = $var(cnt) + 1;
        }
        $var(i) = $var(i) + 1;
    }
    xlog("L_INFO", "CATALOG: inserted $var(cnt) channels\n");
    $xml(cat) = NULL;
    return 1;
}

route[process_device_info] {
    # DeviceInfo 响应处理（可扩展）
    return 1;
}

########### INVITE 处理 ##########

route[invite] {
    do_accounting("log");

    # GB28181 回放：平台 INVITE 子通道
    # 条件：From/To 域名是本机；R-URI 域名非本机；用户名纯数字
    if ((is_myself("$fd") || is_myself("$td")) && !is_myself("$rd") && $rU =~ "^[0-9]+$") {
        if (route(gb28181_playback)) {
            exit;
        }
        sl_send_reply(404, "Channel Not Found");
        return -1;
    }

    # 标准位置查询
    if (!lookup("location")) {
        t_reply(404, "Not Found");
        return -1;
    }

    do_accounting("log", "missed");
    route(forward);
    return 1;
}

route[gb28181_playback] {
    # sql-only 模式下 lookup 直接查 SQLite
    if (lookup("location")) {
        t_on_reply("handle_nat");
        t_relay();
        return 1;
    }
    return -1;
}

route[forward] {
    t_on_reply("handle_nat");
    if (!ds_select_dst(1, 0, "f")) {
        t_reply(503, "Service Unavailable");
        return -1;
    }
    t_relay();
    return 1;
}

########### 主路由 ##########

route {
    route(maxfwd);
    if ($rc < 0) exit;

    if (has_totag()) {
        route(in_dialog);
        exit;
    }

    route(dedup);

    if (is_method("CANCEL")) {
        forward();
        exit;
    }

    if (is_method("REGISTER")) {
        route(register);
        exit;
    }

    if (is_method("MESSAGE")) {
        route(message);
        exit;
    }

    if (is_method("INVITE")) {
        route(invite);
        exit;
    }

    if (is_method("PUBLISH|SUBSCRIBE")) {
        sl_send_reply(503, "Service Unavailable");
        exit;
    }

    # 其他方法
    if (!lookup("location", "method-filtering")) {
        t_reply(404, "Not Found");
        exit;
    }
    do_accounting("log", "missed");
    route(forward);
}

route[in_dialog] {
    if (is_method("ACK") && t_check_trans()) {
        t_relay();
        return 1;
    }
    if (!loose_route()) {
        sl_send_reply(404, "Not here");
        return -1;
    }
    if (is_method("BYE"))
        do_accounting("log", "failed");
    route(relay);
    return 1;
}

########### 回复路由 ##########

onreply_route[handle_nat] {
    # === GB28181 SDP 修复 ===
    # 设备 200 OK 缺少 a=setup:active / a=connection:new
    # 注入这两个属性告知 EasyGBS 设备是 active 端（主动发起 TCP 连接）
    if (t_check_status("200") && $mb =~ "application/sdp") {
        fix_nated_sdp("add-no-rtpproxy", "$socket_in(ip)", "\r\na=setup:active\r\na=connection:new");
    }
    fix_nated_contact();
}

########### 失败路由 ##########

failure_route[missed_call] {
    if (t_was_cancelled())
        exit;
}
