########### 全局参数设置 ##########

/* 取消下面的注释以启用调试模式（会输出大量日志）*/
#debug_mode=yes

# 日志级别：0-9，数字越大记录越详细
# 3 = LOG_INFO 级别，记录一般信息
log_level=3

# 模块级日志级别，与 log_level 类似，但用于 xlog 函数输出的日志
xlog_level=3

# 是否将错误日志输出到标准错误（stderr）
# no = 通过 syslog 输出，yes = 输出到控制台
stderror_enabled=yes

# 是否启用系统日志（syslog）记录
syslog_enabled=yes

# syslog 设施等级，用于日志分类
# LOG_LOCAL0 通常用于用户自定义应用日志
syslog_facility=LOG_LOCAL0

# UDP 工作进程数量，决定并发处理 SIP 消息的能力
# 根据服务器配置和预期负载调整
udp_workers=4

/* 取消下面注释以启用自动临时黑名单功能（默认禁用）
   当目标不可达时，自动将其加入黑名单，防止向已知不可用地址发送请求 */
#disable_dns_blacklist=no

/* 取消下面注释以启用 IPv6 DNS 查询失败后回退到 IPv4（默认禁用）
   适用于双栈网络环境 */
#dns_try_ipv6=yes


# SIP 监听套接字配置
# 格式：socket=协议:地址:端口
# 此处配置为在本机 UDP 端口 5060 监听
# 注意：生产环境通常需要修改为实际网卡 IP 地址
socket=udp:20.20.136.66:5060   # 请根据实际环境修改



########### 模块加载部分 ##########

# 设置模块搜索路径（module path）
# OpenSIPS 会从此路径加载 .so 模块文件
mpath="/usr/local/lib64/opensips/modules/"

#### 信令模块 (signaling)
# 功能：SIP 消息的信令平面管理
# 用途：提供信令传输的抽象，是大多数模块的依赖
loadmodule "signaling.so"

#### 无状态响应模块 (stateless)
# 功能：处理无状态的 SIP 响应（不创建事务）
# 用途：直接回复 SIP 响应，如 200 OK、404 等
loadmodule "sl.so"

#### 事务模块 (transaction)
# 功能：SIP 事务层管理（有状态处理）
# 用途：管理 INVITE 事务的创建、计时器、重试等
# 这是核心模块，支撑呼叫控制等高级功能
loadmodule "tm.so"

# tm 模块参数配置：
# fr_timeout: 非 INVITE 请求的最终响应超时时间（秒）
modparam("tm", "fr_timeout", 5)
# fr_inv_timeout: INVITE 请求的最终响应超时时间（秒）
modparam("tm", "fr_inv_timeout", 30)
# restart_fr_on_each_reply: 每次收到回复时是否重启计时器
modparam("tm", "restart_fr_on_each_reply", 0)
# onreply_avp_mode: 回复处理模式
modparam("tm", "onreply_avp_mode", 1)

#### 记录路由模块 (record route)
# 功能：在 SIP 消息中添加 Record-Route 头域
# 用途：确保后续请求（如 BYE、ACK）通过相同路径代理
loadmodule "rr.so"

# 不需要向 Record-Route 添加 From tag（此脚本不需要此功能）
modparam("rr", "append_fromtag", 0)

#### 最大转发次数模块 (max forward)
# 功能：处理 SIP 头中的 Max-Forwards 字段
# 用途：防止 SIP 消息在网络中无限循环
loadmodule "maxfwd.so"

#### SIP 消息操作模块
# 功能：提供对 SIP 消息头和正文的操作函数
# 用途：如添加/删除头部、修改 URI 等
loadmodule "sipmsgops.so"

#### FIFO 管理接口模块
# 功能：提供 FIFO 文件接口用于 OpenSIPS 管理
# 用途：允许外部程序通过文件系统与 OpenSIPS 通信
# 常用于命令行工具如 opensipsctl
#loadmodule "mi_fifo.so"

# FIFO 文件路径
#modparam("mi_fifo", "fifo_name", "/run/opensips/opensips_fifo")
# FIFO 文件权限（八进制）
#modparam("mi_fifo", "fifo_mode", 0666)

#### 用户位置模块 (user location)
# 功能：维护 SIP 用户的位置注册信息（URL 绑定）
# 用途：实现 SIP 呼叫的当前位置查询（类似 DNS）
# 数据存储在内存中，适合单实例部署
loadmodule "usrloc.so"

# NAT 标志名称，用于标识经过了 NAT 的用户
modparam("usrloc", "nat_bflag", "NAT")
# 工作模式预设：单实例无数据库（内存存储）
modparam("usrloc", "working_mode_preset", "single-instance-no-db")

#### 注册服务器模块 (registrar)
# 功能：处理 SIP REGISTER 请求，管理用户注册
# 用途：存储用户当前位置到 usrloc 模块
loadmodule "registrar.so"

# TCP 持久化标志，控制是否保持 TCP 连接
modparam("registrar", "tcp_persistent_flag", "TCP_PERSISTENT")
/* 取消下面注释以限制每个 AOR（地址-of-record）最多 10 个联系地址
   这是一种安全措施，防止注册洪水攻击 */
#modparam("registrar", "max_contacts", 10)

#### 计费/通话记录模块 (accounting)
# 功能：记录通话事件（启动、通话结束、丢弃等）
# 用途：生成 CDR（通话详单）用于计费或分析
loadmodule "acc.so"

# 是否记录早期媒体（early media）事件
modparam("acc", "early_media", 0)
# 是否报告被取消的呼叫
modparam("acc", "report_cancels", 0)
# 是否检测请求方向（用于正确处理计费）
# 启用此参数时，需要确保 rr 模块的 append_fromtag 也已启用
modparam("acc", "detect_direction", 0)

# 加载 UDP 协议处理模块
loadmodule "proto_udp.so"

#### 数据库文本驱动模块 (db_text)
# 功能：基于文本文件的数据库引擎，用文本文件模拟数据库
# 用途：用于不需要 MySQL 等数据库的场景，用文本文件存储数据
loadmodule "db_text.so"

#### 调度器模块 (dispatcher)
# 功能：SIP 目标地址的负载均衡和故障转移
# 用途：通过 ds_select_dst() 选择目标并转发请求
loadmodule "dispatcher.so"

#### UAC 模块 (uac)
# 功能：修改 SIP 消息中的 From/To/Contact 头域
# 用途：代理转发 REGISTER 时替换 Contact，使平台后续消息先发到代理
loadmodule "uac.so"

#### NAT 检测与处理模块 (nathelper)
# 功能：检测和修复 NAT 穿透问题
# 用途：确保位于 NAT 后的客户端响应经过代理
loadmodule "nathelper.so"
# 清空默认的 a=nortpproxy:yes 行,只为能启用 fix_nated_sdp 第 3 参数的
# new_sdp_lines 注入路径(add-no-rtpproxy flag + new_sdp_lines 互不冲突)
modparam("nathelper", "nortpproxy_str", "")

#### XML 解析模块 (xml)
# 功能：基于 libxml2 解析 SIP 消息体中的 XML（GB28181 Catalog 等）
# 用途：自学习设备与通道关系时使用 $xml(path) 替代脆弱的 re.subst 字符串匹配
loadmodule "xml.so"

#### SQL 操作模块 (sqlops)
# 功能：在 SIP 信令处理过程中执行 SQL 查询并把结果写到 AVP
# 用途：把 GB28181 子通道 ID 映射到所属设备 AOR，支持平台→通道的 INVITE 回放路由
# 这里使用默认 DB URL（id=0），指向 db_text 数据目录
loadmodule "sqlops.so"
modparam("sqlops", "db_url", "text:///etc/opensips/dbtext/channel_aliases")

########### 模块参数配置 ##########

# dispatcher 模块参数：使用 db_text 驱动
# db_url: 数据库连接URL，text:// 开头表示使用 db_text 驱动
modparam("dispatcher", "db_url", "text:///etc/opensips/dbtext/dispatcher")
# table_name: 调度器表名
modparam("dispatcher", "table_name", "dispatcher")

# db_text 模块参数：非缓存模式，检测文件变化自动重载
modparam("db_text", "db_mode", 1)

########### 路由逻辑部分 ##########

# ========== GB28181 通道→设备别名查找 ==========
# 用法：在 INVITE 回放场景下，把子通道 ID 映射到已注册的设备 AOR
# 输入：$rU（子通道 ID）
# 输出：$avp(device_aor) = 设备 AOR；未找到时返回 -1
route[lookup_channel_alias] {
	xlog("L_INFO", "GB28181: looking up channel alias for $rU\n");
	# 注意:db_text 不支持 raw_query,必须用结构化 sql_select
	# sql_select_one 只返回一行,适合主键查找
	# columns 必须是 JSON 数组字符串(如 ["device_aor"]),filter 也是 JSON
	# 结果直接写入 $avp(device_aor) (数量与列数匹配)
	$avp(sql_sel_cols) = "[\"device_aor\"]";
	$avp(sql_sel_filter) = "[{\"channel_id\":\"" + $rU + "\"}]";
	sql_select_one("$avp(sql_sel_cols)", "channel_aliases", "$avp(sql_sel_filter)", , "$avp(device_aor)");
	if ($avp(device_aor) == NULL) {
		xlog("L_WARN", "GB28181: no alias found for channel $rU\n");
		return -1;
	}
	xlog("L_INFO", "GB28181: channel $rU -> $avp(device_aor)\n");
	return 1;
}

# ========== GB28181 MESSAGE handling ==========
route[gb28181_device_query] {
	xlog("L_INFO", "GB28181: Processing MESSAGE for device query\n");

	# 平台发送的MESSAGE，From头包含平台域名
	# To头是设备ID@平台域名
	# lookup 使用 To 头作为 AOR 查找设备实际地址
	# 查到的 Contact（设备实际IP）会替换 RURI

	xlog("L_INFO", "GB28181: Looking up location for tu=[$tu]\n");
	if (lookup("location")) {
		xlog("L_INFO", "GB28181: Found device in usrloc, forwarding to [$ru]\n");

		# 设置 onreply 路由处理 NAT
		t_on_reply("handle_nat");

		# lookup 已经把 R-URI 改成了设备的 Contact 地址
		# 直接 t_relay 即可，不需要再 ds_select_dst
		t_relay();
		exit;
	}

	xlog("L_WARN", "GB28181: Device not found in usrloc for tu=[$tu]\n");
	t_reply(404, "Device Not Found");
	exit;
}

# 主请求路由逻辑
# 这是 OpenSIPS 处理每个 SIP 请求的入口点

route{

	# ========== 步骤1：最大转发次数检查 ==========
	# 检查 Max-Forwards 头字段，防止消息在网络中循环
	# 参数 10 表示最大跳数限制，如果达到 0 则拒绝请求
	if (!mf_process_maxfwd_header(10)) {
		send_reply(483,"Too Many Hops");  # 483 = 跳数过多
		exit;
	}

	# ========== 步骤2：检测是否为对话中的请求 ==========
	# To 字头（totag）用于标识对话中的请求（ACK、BYE、UPDATE 等）
	if (has_totag()) {

		# 处理 hop-by-hop 的 ACK（端到端确认）
		# 用于确认 200 OK 响应
		if ( is_method("ACK") && t_check_trans() ) {
			t_relay();
			exit;
		}

		# 对于对话中的顺序请求（如 BYE、UPDATE、REFER）
		# 需要按照 Record-Route 确定的路径发送
		if ( !loose_route() ) {
			# 如果收到没有 Route 头的顺序请求，说明配置有误
			# 我们为所有流量都做记录路由，所以不应该收到这种请求
			send_reply(404,"Not here");
			exit;
		}

		# 对于 BYE 请求，进行计费记录
		if (is_method("BYE")) {
			# 即使事务失败也要记录（用于统计被叫挂断等情况）
			do_accounting("log","failed");
		}

		# 将请求路由到 loose_route() 设置的目标 URI
		# 目标 URI 存储在 $du 变量中
		route(relay);
		exit;
	}

	# ========== 步骤3：处理 CANCEL 请求 ==========
	# CANCEL 用于取消正在进行的 INVITE 事务
	# 纯代理模式下直接转发 CANCEL
	if (is_method("CANCEL")) {
		forward();
		exit;
	}

	# ========== 步骤4：吸收重复请求 ==========
	# t_check_trans() 会检测重复请求并将其丢弃
	# 不会创建新事务，适用于无法创建事务的请求
	t_check_trans();

	# ========== 步骤5：检查请求的来源和目标 ==========
	# 判断是否为本地用户发出的请求
	if ( !(is_method("REGISTER")  ) ) {
		# 检查 From 头中的域名是否为本地域名
		if (is_myself("$fd")) {
			# 本地用户，可以继续处理
		} else {
			# 非本地用户呼叫，检查被叫是否在本地
			# 如果被叫也不是本地用户，则拒绝转发（防止成为开放中继）
			if (!is_myself("$rd")) {
				send_reply(403,"Relay Forbidden");  # 403 = 禁止中继
				exit;
			}
		}
	}

	# ========== 步骤6：预加载路由检查 ==========
	# 检查请求是否包含预加载的 Route 头（可能存在安全风险）
	if (loose_route()) {
		xlog("L_ERR",
			"Attempt to route with preloaded Route's [$fu/$tu/$ru/$ci]");
		if (!is_method("ACK"))
			send_reply(403,"Preload Route denied");
		exit;
	}

	# ========== 步骤7：记录路由 ==========
	# 为非 REGISTER 和非 MESSAGE 的请求添加 Record-Route 头
	# 确保后续请求通过相同代理路径
	if (!is_method("REGISTER|MESSAGE"))
		record_route();

	# ========== 步骤8：INVITE 计费 ==========
	# 对 INVITE 呼叫进行计费记录（开始计时）
	if (is_method("INVITE")) {
		do_accounting("log");
	}

	# ========== 步骤9：非本地请求路由 ==========
	# 如果被叫不在本地，添加到调度器并转发到外部
	# 只有当目标地址是 IP:PORT 格式时才走这一步（设备→平台的消息）
	# 如果是域名格式（如设备域名），说明可能是平台→设备的查询，需要继续往下处理
	if (!is_myself("$rd") && ($rd =~ "^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+:[0-9]+")) {
		append_hf("P-hint: outbound\r\n");  # 添加标记头域

		# 设置 onreply 路由处理 NAT
		t_on_reply("handle_nat");

		# 使用 dispatcher 选择目标并通过 tm 中继转发
		if (!ds_select_dst(1, 0, "f")) {
			sl_send_reply(503, "Service Unavailable");
			exit;
		}
		t_relay();
		exit;
	}

	# ========== 步骤9b：设备响应平台的 MESSAGE ==========
	# 如果是 MESSAGE 且 From 是域名格式（设备）但 To 是本机（代理）
	# 说明这是设备回复平台的响应，需要通过 dispatcher 发送到平台
	if (is_method("MESSAGE") && !($fu =~ "@[0-9]+\.[0-9]+\.[0-9]+:[0-9]+") && is_myself("$rd")) {

		# --- GB28181 自学习：解析 Catalog 响应，建立通道→设备映射 ---
		# 设备响应 Catalog 查询时（XML 体里含 <Item><DeviceID>X</DeviceID>...
		# <ParentID>Y</ParentID></Item>），代理抽取该映射并写入 channel_aliases。
		# 这样下次平台对该通道发 INVITE 时，步骤 12c 即可查到映射。
		# 用 xml 模块(libxml2)解析，避免脆弱的 re.subst 字符串匹配
		$avp(rb_len) = $(rb{s.len});
		$avp(rb_head) = $(rb{s.select,0,80});
		xlog("L_INFO", "GB28181 diag: rb_len=$avp(rb_len) rb_head=[$avp(rb_head)]\n");
		if ($rb =~ "Catalog") {
			$xml(cat) = $rb;
			$avp(chan_id) = $xml(cat/Response/DeviceList/Item[0]/DeviceID.val);
			$avp(parent_id) = $xml(cat/Response/DeviceList/Item[0]/ParentID.val);
			# 校验：提取结果为数字 ID 且通道 ≠ 父设备（避免设备自指）
			if ($avp(chan_id) =~ "^[0-9]+$" && $avp(parent_id) =~ "^[0-9]+$"
				&& $avp(chan_id) != $avp(parent_id)) {
				# 构造设备 AOR：sip:parentID@$fd（$fd 是设备自身域）
				$avp(device_aor) = "sip:" + $avp(parent_id) + "@" + $fd;
				# DELETE + INSERT 保证 channel_id 唯一（避免同通道多份重复行）
				# db_text 不支持 raw_query,改用结构化 sql_delete / sql_insert
				# filter / columns 接受 JSON 字符串,值里可嵌入 $avp() 变量
				$avp(sql_del) = "[{\"channel_id\":\"" + $avp(chan_id) + "\"}]";
				sql_delete("channel_aliases", "$avp(sql_del)");
				$avp(sql_ins) = "[{\"channel_id\":\"" + $avp(chan_id) + "\"},{\"device_aor\":\"" + $avp(device_aor) + "\"}]";
				sql_insert("channel_aliases", "$avp(sql_ins)");
				xlog("L_INFO", "GB28181 self-learn: $avp(chan_id) -> $avp(device_aor)\n");
			} else {
				xlog("L_WARN", "GB28181 self-learn: Catalog body parse failed (chan=[$avp(chan_id)] parent=[$avp(parent_id)])\n");
			}
			# 释放 xml 对象
			$xml(cat) = NULL;
		}

		xlog("L_INFO", "Device response to platform via dispatcher: $ru\n");
		append_hf("P-hint: outbound\r\n");
		t_on_reply("handle_nat");
		if (ds_select_dst(1, 0, "f")) {
			t_relay();
		} else {
			sl_send_reply(503, "Service Unavailable");
		}
		exit;
	}

	# ========== 步骤10：处理本地请求 ==========

	# PUBLISH 和 SUBSCRIBE 暂不支持，返回服务不可用
	if (is_method("PUBLISH|SUBSCRIBE")) {
		send_reply(503, "Service Unavailable");
		exit;
	}

	# ========== 步骤11：处理 REGISTER 注册 ==========
	if (is_method("REGISTER")) {
		# 保存源地址到 AVP (用于日志)
		$avp(src_ip) = $si;
		$avp(src_port) = $sp;
		xlog("L_INFO", "REGISTER: src_ip=$avp(src_ip) src_port=$avp(src_port)\n");

		# 使用 nathelper 的 fix_nated_contact 替换 Contact 头为设备实际地址
		fix_nated_contact();
		xlog("L_INFO", "REPLACED Contact with ip=$avp(src_ip) port=$avp(src_port)\n");

		# 验证
		xlog("L_INFO", "Contact after replace: $ct\n");

		# 保存到 usrloc
		if (!save("location", "no-reply"))
			xlog("failed to register AoR $tu\n");

		# 设置 onreply 路由处理 NAT
		t_on_reply("handle_nat");

		# 使用 dispatcher 选择目标并通过 tm 中继转发到上游
		if (ds_select_dst(1, 0, "f")) {
			t_relay();
		} else {
			sl_send_reply(503, "Service Unavailable");
		}
		exit;
	}

	# ========== 步骤12：检查请求中的用户名 ==========
	# $rU 是请求 URI 中的用户名部分
	if ($rU==NULL) {
		# 请求中没有用户名，如 sip:@domain.com
		send_reply(484,"Address Incomplete");  # 484 = 地址不完整
		exit;
	}

	# ========== 步骤12b：GB28181 设备查询处理 ==========
	# 对于来自上游平台的 MESSAGE 查询
	# 检测条件：MESSAGE 且 To 头不是 IP:PORT 格式
	# - To: <sip:设备ID@设备域名>     → 平台→设备（需要处理）
	# - To: <sip:平台ID@IP:PORT>      → 设备→平台（不处理）
	xlog("L_INFO", "MESSAGE check: tu=[$tu] td=[$td]\n");
	if (is_method("MESSAGE") && !($tu =~ "@[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+:[0-9]+")) {
		xlog("L_INFO", "GB28181: Platform MESSAGE detected, calling gb28181_device_query\n");
		# 使用 GB28181 特殊处理，从 XML body 提取 DeviceID 进行路由
		route(gb28181_device_query);
		exit;
	}

	# ========== 步骤12c: GB28181 INVITE 回放（平台→子通道）==========
	# 平台发给子通道的 INVITE，RURI 用户名是 20 位数字 ID（子通道 ID）、
	# RURI 域是平台自身域（不同于本机监听 IP）。
	# 这里需要把"通道"映射回它所属的"设备" AOR，然后再 lookup + t_relay。
	# 与步骤 13 相比，差异在于：本步之后直接 t_relay，
	# 不再走 ds_select_dst（dispatcher 只配了平台一条记录，不应路由到平台）。
	if (is_method("INVITE") && is_myself("$fd") && !is_myself("$rd") && $rU =~ "^[0-9]+$") {
		# === DEBUG: 抓取平台 INVITE 的关键 SDP 字段,辅助排查媒体流 ===
		$avp(d_c)   = $(rb{re.subst, /^[\s\S]*?c=IN IP4 (\S+)[\s\S]*$/\1/s});
		$avp(d_m)   = $(rb{re.subst, /^[\s\S]*?\nm=(\S+)[\s\S]*$/\1/s});
		$avp(d_set) = $(rb{re.subst, /^[\s\S]*?\na=setup:(\w+)[\s\S]*$/\1/s});
		$avp(d_con) = $(rb{re.subst, /^[\s\S]*?\na=connection:(\w+)[\s\S]*$/\1/s});
		$avp(d_dir) = $(rb{re.subst, /^[\s\S]*?\na=(sendonly|recvonly|sendrecv)[\s\S]*$/\1/s});
		xlog("L_INFO", "PB-INV-IN: ch=$rU c=$avp(d_c) m=$avp(d_m) setup=$avp(d_set) conn=$avp(d_con) dir=$avp(d_dir) from=$fu\n");
		route(lookup_channel_alias);
		if ($rc == 1) {
			# 重写 RURI 为设备 AOR（$ru 是可写伪变量）
			$ru = $avp(device_aor);
			# 同步重写 To 头为设备 AOR（设备用 device 域做后续回执）
			remove_hf("To");
			$avp(to_hf) = "To: <" + $avp(device_aor) + ">\r\n";
			append_hf("$avp(to_hf)");
			xlog("L_INFO", "GB28181 Playback: rewrote INVITE RURI/To to $avp(device_aor)\n");
			# 类似 gb28181_device_query：查设备位置后直接 t_relay
			if (lookup("location")) {
				xlog("L_INFO", "PB-FORWARD: device_aor=$avp(device_aor) ru=[$ru] sock_in=$socket_in(ip)\n");
				t_on_reply("handle_nat");
				t_relay();
				exit;
			} else {
				xlog("L_WARN", "GB28181 Playback: device $avp(device_aor) not registered\n");
				t_reply(404, "Device Not Registered");
				exit;
			}
		}
		# 未命中别名映射时，落到下面的标准 lookup，平台侧会看到 404
	}

	# ========== 步骤13：位置查询 ==========
	# 在 usrloc 中查找被叫用户的位置
	# method-filtering 允许根据请求方法过滤联系人
	if (!lookup("location","method-filtering")) {
		# 未找到用户位置
		t_reply(404, "Not Found");
		exit;
	}

	# ========== 步骤14：记录丢失的呼叫 ==========
	# 如果呼叫未能成功连接（如被叫无响应），记录为"丢失"
	do_accounting("log","missed");

	# 设置 onreply 路由处理 NAT
	t_on_reply("handle_nat");

	# ========== 步骤15：使用 dispatcher 转发到被叫位置 ==========
	# 通过 ds_select_dst 使用 dispatcher 选择目标并通过 tm 中继转发
	if (!ds_select_dst(1, 0, "f")) {
		t_reply(404, "Not Found");
		exit;
	}
	t_relay();
}


# ========== 中继路由块（relay route） ==========
# 负责将 SIP 请求转发到目标地址（纯代理模式）
route[relay] {
	# 纯代理模式：直接转发请求，不创建事务
	forward();
	exit;
}



# ========== 分支路由块 ==========
# 当 INVITE 呼叫创建多个分支时（如呼叫同时振铃多个设备）触发
branch_route[per_branch_ops] {
	xlog("new branch at $ru\n");  # 记录新分支的目标 URI
}


# ========== 回复处理路由块 ==========
# 处理从网络收到的 SIP 响应消息
onreply_route[handle_nat] {
	xlog("incoming reply\n");  # 记录收到的响应

	# --- 自学习:在 200 OK 响应里识别 Catalog 响应 XML ---
	# 平台→设备方向(t_relay 后的响应)有 200 OK 携带 Catalog 响应体,
	# 这里把 body 抽出来用 xml 模块解析 Item/ParentID 写回 dbtext。
	# onreply_route 里优先使用 $rb(body);若 rb 为空再从 $mb 切到首个 \r\n\r\n
	# 之后的内容作为 body。
	xlog("L_INFO", "GB28181 reply-hit: status=$rs mb_len=$(mb{s.len}) mb_head=[$(mb{s.select,0,60})]\n");
	# === GB28181 设备 bug 兼容 + 规范补充:EasyGBD 的 200 OK SDP 漏写
	# a=setup:active 和 a=connection:new(GB28181-2016 强制要求)。
	# 同时设备 200 OK 自带 c=20.20.83.203, m=3288 是设备侧真实媒体端点;
	# 之前把 c= 改写为平台 IP 后,c=:m= 自相矛盾(目标平台,端口设备),反而
	# 让 EasyGBS 失去设备媒体端点的线索。改为:不重写 c=,只补 a=setup:active
	# / a=connection:new(告知 EasyGBS 设备是 active 端,应主动发起 TCP)。
	# new_sdp_lines 末尾不带 \r\n,避免和 nathelper 的 a=oldcip 之间多出空行。
	if (t_check_status("200") && $mb =~ "application/sdp") {
		# === DEBUG: 抓取设备 200 OK 的关键 SDP 字段(我们改写前),辅助排查 ===
		$avp(d_c)   = $(rb{re.subst, /^[\s\S]*?c=IN IP4 (\S+)[\s\S]*$/\1/s});
		$avp(d_m)   = $(rb{re.subst, /^[\s\S]*?\nm=(\S+)[\s\S]*$/\1/s});
		$avp(d_set) = $(rb{re.subst, /^[\s\S]*?\na=setup:(\w+)[\s\S]*$/\1/s});
		$avp(d_con) = $(rb{re.subst, /^[\s\S]*?\na=connection:(\w+)[\s\S]*$/\1/s});
		$avp(d_dir) = $(rb{re.subst, /^[\s\S]*?\na=(sendonly|recvonly|sendrecv)[\s\S]*$/\1/s});
		xlog("L_INFO", "PB-200OK-DEV: c=$avp(d_c) m=$avp(d_m) setup=[$avp(d_set)] conn=[$avp(d_con)] dir=$avp(d_dir) mb_len=$(mb{s.len})\n");
		fix_nated_sdp("add-no-rtpproxy", "$socket_in(ip)", "\r\na=setup:active\r\na=connection:new");
		xlog("L_INFO", "PB-200OK-FIX: applied (inject setup:active/connection:new)\n");
	}
	if (t_check_status("2[0-9][0-9]") && $mb =~ "Catalog") {
		$avp(cat_body) = $rb;
		if ($avp(cat_body) == NULL || $(avp(cat_body){s.len}) == 0) {
			$avp(cat_body) = $(mb{re.subst, /^[\s\S]*?\r\n\r\n([\s\S]*)$/\1/s});
		}
		if ($avp(cat_body) != NULL && $(avp(cat_body){s.len}) > 0) {
			# 用 libxml2 解析 Catalog 响应,遍历 Item 写入 channel_aliases
			$xml(cat) = $avp(cat_body);
			$var(i) = 0;
			while ($var(i) < 256) {
				$avp(chan_id) = $xml(cat/Response/DeviceList/Item[$var(i)]/DeviceID.val);
				if ($avp(chan_id) == NULL || $(avp(chan_id){s.len}) == 0) {
					break;
				}
				$avp(parent_id) = $xml(cat/Response/DeviceList/Item[$var(i)]/ParentID.val);
				if ($avp(parent_id) =~ "^[0-9]+$" && $avp(chan_id) != $avp(parent_id)) {
					# 设备域用 From 头里的域($fd 在 onreply 仍指请求 From 域)
					$avp(device_aor) = "sip:" + $avp(parent_id) + "@" + $fd;
					# db_text 不支持 raw_query,改用结构化 sql_delete / sql_insert
					$avp(sql_del) = "[{\"channel_id\":\"" + $avp(chan_id) + "\"}]";
					sql_delete("channel_aliases", "$avp(sql_del)");
					$avp(sql_ins) = "[{\"channel_id\":\"" + $avp(chan_id) + "\"},{\"device_aor\":\"" + $avp(device_aor) + "\"}]";
					sql_insert("channel_aliases", "$avp(sql_ins)");
					xlog("L_INFO", "GB28181 self-learn: $avp(chan_id) -> $avp(device_aor)\n");
				} else {
					xlog("L_WARN", "GB28181 self-learn: Item[$var(i)] chan=[$avp(chan_id)] parent=[$avp(parent_id)] invalid\n");
				}
				$var(i) = $var(i) + 1;
			}
			# 释放 xml 对象,避免遗留到下一次回复
			$xml(cat) = NULL;
		} else {
			xlog("L_WARN", "GB28181 self-learn: empty body in 200 reply\n");
		}
	}

	# 修复 Contact，确保后续请求/响应经过代理
	fix_nated_contact();
}


# ========== 失败路由块 ==========
# 当事务失败时触发（如被叫无响应、超时等）
failure_route[missed_call] {
	# 检查呼叫是否被取消
	if (t_was_cancelled()) {
		exit;  # 被取消则不再处理
	}

	# 取消下面注释以拒绝基于 3xx 重定向的呼叫
	# 这可以防止呼叫被重定向到未知目的地
	##if (t_check_status("3[0-9][0-9]")) {
	##t_reply(404,"Not found");
	##	exit;
	##}


}
